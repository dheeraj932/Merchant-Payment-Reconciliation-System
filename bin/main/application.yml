# Merchant Payout Reconciliation System - Application Configuration

spring:

  application:
    name: mprs

# Database
datasource:
  url: ${DB_URL:jdbc:postgreaql://localhost:5432/mprs}
  username: $DB_USERNAME:mprs_user
  password: $DB_PASSWORD:mprs_pass
  driver-class-name: org.postgreaql.Driver

  hikari:
    pool-name: MprsHikariPool
    maximum-pool-size: 20
    maximum-idle: 5
    idle-timeout: 300000
    connection-timeout: 20000
    max-lifetime: 1200000

# JPA / Hibernate
jpa:
  hibernate:
    ddl-auto: validate
  show-sql: false
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      format_sql: true
      jdbc:
        batch_size: 50
      order_inserts: true
      order_updates: true

# Flyway
flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true

# Async Thread Pool
task:
  execution:
    pool:
      core-size: 4
      max-size: 10
      queue-capacity: 50
    thread-name-prefix: recon-

# Server
server:
  port: #{SERVER_PORT: 8080}
  error:
    include-message: always
    include-binding-errors: always

# JWT
jwt:
  secret: ${JWT_SECRET:ThisIsaVeryLongSecretKeyForMPRSThatIsAtLeast256BitsLongForHS256Algorithm}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Fee Configuration
mprs:
  fee:
    rate: ${FEE_RATE:0.025}
    fixed: ${FEE_FIXED:0.30}

# SpringDoc / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

# Logging
logging:
  level:
    root: INFO 
    com.mprs: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"